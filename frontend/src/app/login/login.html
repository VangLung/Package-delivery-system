<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">📦</span>
      <h2>Welcome Back</h2>
      <p>Sign in to manage your shipments</p>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" placeholder="Enter your username" (keyup.enter)="onLogin()">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter your password" (keyup.enter)="onLogin()">
    </div>

    <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button class="btn-primary btn-block" (click)="onLogin()" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>

    <p class="auth-switch">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
