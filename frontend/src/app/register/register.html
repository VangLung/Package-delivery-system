<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Register to start using the delivery system</p>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" [(ngModel)]="model.firstName" placeholder="John">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" [(ngModel)]="model.lastName" placeholder="Doe">
      </div>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="model.username" placeholder="Choose a username">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="model.email" placeholder="john@example.com">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="model.password" placeholder="Choose a password">
    </div>

    <div class="form-group">
      <label>Role</label>
      <select [(ngModel)]="model.role">
        <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
      </select>
    </div>

    <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button class="btn-primary btn-block" (click)="onRegister()" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Register' }}
    </button>

    <p class="auth-switch">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
